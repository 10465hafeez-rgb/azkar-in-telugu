name: Build Azkar Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Fresh Flutter App
        run: flutter create azkar_app

      - name: Put Our Code in App
        run: cp azkar.dart azkar_app/lib/main.dart

      - name: Build APK
        run: |
          cd azkar_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Azkar-App-Premium
          path: azkar_app/build/app/outputs/flutter-apk/app-release.apk
